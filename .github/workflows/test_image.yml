name: Run Image Generation Test

on:
  push:
    branches: [ "feature/ai-services" ]
  workflow_dispatch:

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx python-dotenv huggingface_hub

    - name: Run image test
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
      run: python test_image.py

    - name: Upload Generated Image
      uses: actions/upload-artifact@v4
      with:
        name: cyberpunk-image
        path: test_generated_output.jpg